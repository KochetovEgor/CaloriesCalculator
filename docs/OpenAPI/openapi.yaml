openapi: '3.0.3'
info:
  title: Calories Calculator
  version: 1.0.0
servers:
  - url: http://localhost:8000

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    BasicAuth:
      type: http
      scheme: basic
      description: "enter user's name and password"
  
  schemas:
    ErrorResponse:
      type: object
      required: [errors]
      properties:
        errors:
          type: array
          items: 
            type: string
            example: "some error"

    User:
      type: object
      required: [username]
      properties:
        username: { type: string, example: "Raiden Shogun" }
    
    UserPWD:
      type: object
      required: [username, password]
      properties:
        username: {type: string, example: "Raiden Shogun"}
        password: {type: string, minLength: 3, example: "qwerty"}
    
    AccessToken:
      type: object
      required: [access_token]
      properties:
        access_token: { type: string }
    
    Product:
      type: object
      description: "product (or food), that user can add and then calculate their calories"
      required: [name, base_weight, base_portion, calories, fats, proteins, carbohydrates]
      properties:
        name: {type: string, example: "onion"}
        base_weight: 
          type: number
          description: "base weight of product for which calories and other parameters are indicated"
          example: 100
        base_portion: 
          type: number
          description: "base portion of product, that user usually eat"
          example: 250
        calories: {type: number, example: 150.6}
        fats: {type: number, example: 4.4}
        proteins: {type: number, example: 5}
        carbohydrates: {type: number, example: 24.6}
    
    ProductEaten:
      type: object
      description: "shows how much user has eaten of a certain product"
      required: [name, weight, portion, calories, fats, proteins, carbohydrates]
      properties:
        name: {type: string, example: "onion"}
        weight: 
          type: number
          description: "weight of product, that user ate. This sums to portion and then shows calories and other parameters."
          example: 100
        portion: 
          type: number
          description: "number of portions of product, that user ate"
          example: 2.5
        calories: {type: number, example: 300}
        fats: {type: number, example: 20.5}
        proteins: {type: number, example: 36}
        carbohydrates: {type: number, example: 67}
    
    Ration:
      type: object
      description: "user's ration for a ceration date"
      required: [date, calories, fats, proteins, carbohydrates]
      properties:
        date:
          type: string
          description: "date of ration, specified by user in YYYY-MM-DD format"
          example: "2026-03-21"
        calories: {type: number, example: 1820.7}
        fats: {type: number, example: 53}
        proteins: {type: number, example: 110.2}
        carbohydrates: {type: number, example: 250}
    
    RationWithProducts:
      type: object
      description: "user's ration for a certaion date with a list of eaten products"
      required: [date, products]
      properties:
        date:
          type: string
          description: "date of ration, specified by user in YYYY-MM-DD format"
          example: "2026-03-21"
        products:
          type: array
          description: "list of eaten products"
          items:
            $ref: "#/components/schemas/ProductEaten"

  responses:
    '500':
      description: "Internal error"
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            InternalError:
              value:
                errors: ["internal error"]
    '400':
      description: "Bad request"
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            InternalError:
              value:
                errors: ["bad request"]

tags:
  - name: users
    description: "Users managment"
  - name: products
    description: "Products (food) managment"

security:
  - BearerAuth: []

paths:
  /login:
    post:
      tags: [users]
      security: 
        - BasicAuth: []
      responses:
        '200':
          description: "User logined"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccessToken'
        '401':
          description: "Unauthorized"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/500'
  
  /register:
    post:
      tags: [users]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserPWD"
      responses:
        '200':
          description: "User registered"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          description: "Unauthorized"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/500'

  /products:
    get:
      tags: [products]
      description: "Selects all user's products (food)"
      responses:
        '200':
          description: "Products selected and sended to user"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '400':
          $ref: '#/components/responses/400'
        '500':
          $ref: '#/components/responses/500'

    post:
      tags: [products]
      description: "Adds new product"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Product'
      responses:
        '200':
          description: "product successfully added"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '400':
          $ref: '#/components/responses/400'
        '500':
          $ref: '#/components/responses/500'
    put:
      tags: [products]
      description: "Changes existing product"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Product'
      responses:
        '200':
          description: "product successfully changed"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '400':
          $ref: '#/components/responses/400'
        '500':
          $ref: '#/components/responses/500'
    delete:
      tags: [products]
      description: "Deletes existing product"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: {type: string, example: "onion"}
      responses:
        '200':
          description: "product successfully deleted"
        '400':
          $ref: '#/components/responses/400'
        '500':
          $ref: '#/components/responses/500'
