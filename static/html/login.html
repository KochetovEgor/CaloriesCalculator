<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/css/common.css?v=1">
    <link rel="stylesheet" href="/static/css/login.css?v=1">
    <title>Вход в систему</title>
</head>
<body>

    <main>
        <section>
            <h1>Авторизация</h1>
            
            <form id="loginForm" action="/api/login" method="POST">
                <div>
                    <label for="username">Имя пользователя:</label>
                    <input type="text" id="username" name="username" required minlength="3">
                </div>

                <br>

                <div>
                    <label for="password">Пароль:</label>
                    <input type="password" id="password" name="password" required minlength="3">
                </div>

                <br>

                <div>
                    <button id="loginButton" type="submit">Войти</button>
                </div>
            </form>

            <hr>

            <div>
                <p>Ещё нет аккаунта?</p>
                <a href="/register">
                    <button type="button">Регистрация</button>
                </a>
            </div>
        </section>
    </main>

    <footer>
        <p><a href="/">На главную</a></p>
    </footer>

    <template id="error-template">
        <div class="field-errors-container">
            <ul class="error-list">
                </ul>
        </div>
    </template>

    <script src="/static/js/share/show_error.js?v=1"></script>
    <script src="/static/js/login.js?v=2"></script>

</body>
</html>
